# SwiftLint configuration for Lamo
# Run: swiftlint --strict

disabled_rules:
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - type_body_length
  - file_length
  - function_body_length
  - identifier_name
  - nesting

opt_in_rules:
  - empty_count
  - empty_string
  - fatal_error_message

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60

excluded:
  - Packages
  - .build
  - DerivedData
  - LamoTests
